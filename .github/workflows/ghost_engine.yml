name: Multiverse ETL Ghost Engine

on:
  schedule:
    
    - cron: '0 3 * * *'
  workflow_dispatch: 
jobs:
  run-etl-pipeline:
    runs-on: ubuntu-latest 

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas openpyxl

    - name: Execute Main ETL Pipeline
      run: python main.py

    - name: Execute Analytics Engine
      run: python analytics.py

    - name: Upload Executive Report to GitHub
      uses: actions/upload-artifact@v3
      with:
        name: Daily_Multiverse_Report
        path: Multiverse_Report.xlsx